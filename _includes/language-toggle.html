<!-- Language Toggle -->
<div class="language-toggle" role="group" aria-label="Language selection">
  <a href="#" onclick="toggleLanguage('en'); return false;" class="lang-btn" id="lang-en" role="button" aria-pressed="false" aria-label="Switch to English" tabindex="0">EN</a>
  <span class="lang-separator" aria-hidden="true">|</span>
  <a href="#" onclick="toggleLanguage('ko'); return false;" class="lang-btn" id="lang-ko" role="button" aria-pressed="false" aria-label="한국어로 전환" tabindex="0">한국어</a>
  <span class="sr-only" aria-live="polite" aria-atomic="true" id="lang-status"></span>
</div>

<style>
.language-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  background: rgba(35, 42, 46, 0.9);
  padding: 8px 15px;
  border-radius: 999px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  white-space: nowrap; /* keep label on one line */
}

.lang-btn {
  color: #efebd4;
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  transition: color 0.3s ease;
}

.lang-btn:hover,
.lang-btn.active {
  color: #fff;
}

.lang-btn:focus {
  outline: 2px solid #fff;
  outline-offset: 2px;
}

.lang-separator {
  color: #6c757d;
  margin: 0 8px;
}

/* Hide KO content by default; JS will reveal based on preference */
[data-lang="ko"] { display: none; }

@media (max-width: 768px) {
  .language-toggle {
    top: 60px; /* below navbar */
    right: 10px;
    padding: 6px 10px;
  }
  .lang-btn {
    font-size: 0.85rem;
    padding: 2px 4px; /* increase touch target slightly */
  }
  .lang-separator { margin: 0 6px; }
}
</style>

<!-- i18n data injected as raw JSON to avoid JS lint errors -->
<script id="i18n-data" type="application/json">
{{ site.data.languages | jsonify }}
</script>

<script>
// Simple language toggle functionality with i18n text injection
// Parse translations from the JSON script tag
var TRANSLATIONS = (function () {
  try { return JSON.parse(document.getElementById('i18n-data').textContent); }
  catch (e) { return {}; }
})();

function getNested(obj, path) {
  try {
    return path.split('.').reduce(function (acc, key) { return acc && acc[key]; }, obj);
  } catch (e) { return undefined; }
}

function applyTranslations(lang) {
  // Update any elements with data-i18n="key.path"
  document.querySelectorAll('[data-i18n]').forEach(function (el) {
    var key = el.getAttribute('data-i18n');
    var txt = getNested(TRANSLATIONS[lang], key);
    if (typeof txt === 'string') {
      el.textContent = txt;
    }
  });
}

function toggleLanguage(lang) {
  try {
    // Store preference
    localStorage.setItem('preferred-language', lang);

    // Set <html lang>
    document.documentElement.setAttribute('lang', lang);

    // Update active state and aria-pressed
    document.querySelectorAll('.lang-btn').forEach(function (btn) {
      btn.classList.remove('active');
      btn.setAttribute('aria-pressed', 'false');
    });
    var activeBtn = document.getElementById('lang-' + lang);
    if (activeBtn) {
      activeBtn.classList.add('active');
      activeBtn.setAttribute('aria-pressed', 'true');
    }

    // Show/hide language-specific content blocks
    if (lang === 'ko') {
      document.querySelectorAll('[data-lang="ko"]').forEach(function (el) { el.style.display = 'block'; });
      document.querySelectorAll('[data-lang="en"]').forEach(function (el) { el.style.display = 'none'; });
    } else {
      document.querySelectorAll('[data-lang="en"]').forEach(function (el) { el.style.display = 'block'; });
      document.querySelectorAll('[data-lang="ko"]').forEach(function (el) { el.style.display = 'none'; });
    }

    // Apply translated texts
    if (TRANSLATIONS && TRANSLATIONS[lang]) {
      applyTranslations(lang);
    }

    // Re-init header typed text if available
    if (typeof window.reinitTyped === 'function') {
      window.reinitTyped(lang);
    }

    var statusEl = document.getElementById('lang-status');
    if (statusEl) {
      statusEl.textContent = (lang === 'ko') ? '언어가 한국어로 변경되었습니다.' : 'Language switched to English.';
    }
    console.log('Language switched to:', lang);
  } catch (e) {
    console.warn('Language switch error:', e);
  }
}

// Initialize language on page load
document.addEventListener('DOMContentLoaded', function () {
  var savedLang = localStorage.getItem('preferred-language') || 'en';
  toggleLanguage(savedLang);

  // Keyboard accessibility: activate with Enter/Space
  function bindKey(el, lang) {
    if (!el) return;
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleLanguage(lang);
      }
    });
  }
  bindKey(document.getElementById('lang-en'), 'en');
  bindKey(document.getElementById('lang-ko'), 'ko');
});
</script>
