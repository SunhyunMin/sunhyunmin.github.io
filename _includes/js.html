// CV Download Tracking
function trackDownload(type, format) {
  // Simple analytics tracking
  if (typeof gtag !== 'undefined') {
    gtag('event', 'file_download', {
      'file_name': type + '_SunhyunMin.' + format.toLowerCase(),
      'file_type': format
    });
  }
  
  // Console log for development
  console.log('Download tracked:', type, format);
  
  // You can add more analytics services here
}
</script>

<script>
  function toggleNavCollapse() {
    50 < $(".navbar").offset().top
      ? $(".navbar-fixed-top").addClass("top-nav-collapse")
      : $(".navbar-fixed-top").removeClass("top-nav-collapse");
  }
  $(document).ready(toggleNavCollapse);
  $(window).scroll(toggleNavCollapse);
  $(function () {
    $("a.page-scroll").bind("click", function (b) {
      var a = $(this);
      $("html, body")
        .stop()
        .animate(
          { scrollTop: $(a.attr("href")).offset().top - 50 },
          1500,
          "easeInOutExpo",
          function () {
            a.blur();
          },
        );
      b.preventDefault();
    });
  });
  $(".navbar-collapse ul li a").click(function () {
    $(".navbar-toggle:visible").click();
  });
</script>

  {% if site.dynamic-typing %}

  <!-- Dynamic Typing Start -->

  <script
    type="text/javascript"
    src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/1.1.7/typed.min.js"
  ></script>
  <script type="application/json" id="typed-config">
  {
    "typeSpeed": {{ site.type-speed | jsonify }},
    "backDelay": {{ site.delete-delay | jsonify }},
    "startDelay": {{ site.start-delay | jsonify }},
    "loop": {{ site.loop | jsonify }},
    "loopCount": {{ site.loop-count | jsonify }},
    "shuffle": {{ site.shuffle | jsonify }},
    "showCursor": {{ site.show-cursor | jsonify }}
  }
  </script>
  <script type="application/json" id="header-fallback-lines">{{ site.lines | map: 'text' | jsonify }}</script>

  <script type="text/javascript">

    // Build fallback quotes from _config.yml (parsed from JSON script block)
    var fallbackQuotes = [];
    (function(){
      var fEl = document.getElementById('header-fallback-lines');
      try { fallbackQuotes = fEl ? JSON.parse(fEl.textContent) : []; }
      catch(e) { fallbackQuotes = []; }
    })();

    // Load typed config JSON
    var __TYPED_CFG__ = {};
    (function(){
      var cfgEl = document.getElementById('typed-config');
      try { __TYPED_CFG__ = cfgEl ? JSON.parse(cfgEl.textContent) : {}; }
      catch(e){ __TYPED_CFG__ = {}; }
      window.__TYPED_CFG__ = __TYPED_CFG__;
    })();

    function getQuotesForLang(lang) {
      try {
        if (typeof TRANSLATIONS !== 'undefined' && TRANSLATIONS[lang] && TRANSLATIONS[lang].header && Array.isArray(TRANSLATIONS[lang].header.lines)) {
          return TRANSLATIONS[lang].header.lines;
        }
      } catch (e) {}
      return fallbackQuotes;
    }

    function shuffle(array) {
      var currentIndex = array.length, temporaryValue, randomIndex ;

      // While there remain elements to shuffle...
      while (0 !== currentIndex) {

        // Pick a remaining element...
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex -= 1;

        // And swap it with the current element.
        temporaryValue = array[currentIndex];
        array[currentIndex] = array[randomIndex];
        array[randomIndex] = temporaryValue;
      }

      return array;
    }

    function initTypedWithQuotes(quotes) {
      if (__TYPED_CFG__.shuffle) { shuffle(quotes); }
      $(".intro-text").typed({
        strings: quotes,
        typeSpeed: Number(__TYPED_CFG__.typeSpeed || 12),
        backDelay: Number(__TYPED_CFG__.backDelay || 3500),
        startDelay: Number(__TYPED_CFG__.startDelay || 100),
        loop: !!__TYPED_CFG__.loop,
        loopCount: (__TYPED_CFG__.loopCount === false ? false : Number(__TYPED_CFG__.loopCount || 0)),
        showCursor: (__TYPED_CFG__.showCursor !== false),
        cursorChar: "|"
      });
    }

    // Initial init based on saved language (ensures text appears on first load)
    (function(){
      var savedLang = (localStorage && localStorage.getItem('preferred-language')) || 'en';
      var quotes = getQuotesForLang(savedLang);
      initTypedWithQuotes(quotes);
    })();

    // Expose a reinit API for language toggle
    window.reinitTyped = function(lang) {
      try {
        var quotes = getQuotesForLang(lang || 'en');
        // Ensure previous typed cursor is removed to prevent duplicates
        if ($('.typed-cursor').length) {
          $('.typed-cursor').remove();
        }
        var $el = $(".intro-text");
        var $clone = $el.clone().text("");
        $el.replaceWith($clone);
        initTypedWithQuotes(quotes);
      } catch (e) {
        console.warn('Reinit typed failed:', e);
      }
    };
  </script>

  <!-- Dynamic Typing End  -->

  {% endif %}

{% endif %}
